<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>BLUSHORIA ✨</title>

  <link
    rel="stylesheet"
    href="style.css"
  >

</head>

<body>

  <!-- HERO -->

  <section class="hero">

    <div class="overlay"></div>

    <div class="hero-content">

      <img
        src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?q=80&w=1200&auto=format&fit=crop"
        class="logo"
      >

      <h1>
        BLUSHORIA ✨
      </h1>

      <p>
        Luxury Girlie Essentials 💕
      </p>

      <a href="#products">

        <button>
          Shop Now 💖
        </button>

      </a>

    </div>

  </section>

  <!-- PRODUCTS -->

  <section
    class="products"
    id="products"
  >

    <!-- PRODUCT 1 -->

    <div class="card">

      <img
        src="https://images.unsplash.com/photo-1586495777744-4413f21062fa?q=80&w=1200&auto=format&fit=crop"
      >

      <h2>
        Magic Lipgloss
      </h2>

      <p>
        Luxury glossy lip shine ✨
      </p>

      <h3>
        ₦1500
      </h3>

      <button
      onclick="addToCart(
      'Magic Lipgloss',
      1500
      )">

        Add To Cart 💖

      </button>

    </div>

    <!-- PRODUCT 2 -->

    <div class="card">

      <img
        src="https://images.unsplash.com/photo-1594035910387-fea47794261f?q=80&w=1200&auto=format&fit=crop"
      >

      <h2>
        Mini Perfume
      </h2>

      <p>
        Soft luxury feminine scent 💕
      </p>

      <h3>
        ₦3000
      </h3>

      <button
      onclick="addToCart(
      'Mini Perfume',
      3000
      )">

        Add To Cart 💖

      </button>

    </div>

    <!-- PRODUCT 3 -->

    <div class="card">

      <img
        src="https://images.unsplash.com/photo-1631730486572-2260c1f1f3e8?q=80&w=1200&auto=format&fit=crop"
      >

      <h2>
        Girlie Lip Balm
      </h2>

      <p>
        Cute glossy pink lip balm 💄
      </p>

      <h3>
        ₦1800
      </h3>

      <button
      onclick="addToCart(
      'Girlie Lip Balm',
      1800
      )">

        Add To Cart 💖

      </button>

    </div>

  </section>

  <!-- CART -->

  <section class="cart">

    <h2>
      Your Cart 🛒
    </h2>

    <div id="cart-items"></div>

    <h3>

      Total:
      <span id="cart-total">
        ₦0
      </span>

    </h3>

    <button onclick="orderNow()">

      Order On WhatsApp ✨

    </button>

  </section>

  <!-- FOOTER -->

  <footer>

    © 2025 BLUSHORIA ✨

  </footer>

  <script
  type="module"
  src="script.js">
  </script>

</body>
</html>
